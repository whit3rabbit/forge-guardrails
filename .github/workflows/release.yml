name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail

          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "forge-guardrails") | .version')"
          expected_tag="v${crate_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match crate version ${crate_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check all targets
        run: cargo check --workspace --all-targets --locked

      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test all targets
        run: cargo test --workspace --all-targets --locked

      - name: Package crate
        run: cargo package --locked

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  build-binary:
    name: Build ${{ matrix.suffix }} binary
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            suffix: linux-x86_64
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            suffix: windows-x86_64
            archive_ext: zip
          - target: aarch64-apple-darwin
            runner: macos-14
            suffix: macos-arm64
            archive_ext: zip
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            suffix: macos-x86_64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --target ${{ matrix.target }}
          rustup default stable

      - name: Build proxy binary
        run: cargo build --release --locked --bin forge-guardrails-proxy --target ${{ matrix.target }}

      - name: Stage Unix archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          ver="${VERSION#v}"
          mkdir -p dist
          cp "target/${TARGET}/release/forge-guardrails-proxy" dist/forge-guardrails-proxy
          cd dist
          archive="forge-guardrails-proxy-${ver}-${SUFFIX}.${ARCHIVE_EXT}"
          if [[ "${ARCHIVE_EXT}" == "tar.gz" ]]; then
            tar -czf "${archive}" forge-guardrails-proxy
          else
            zip "${archive}" forge-guardrails-proxy
          fi

      - name: Stage Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          SUFFIX: ${{ matrix.suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          $ver = $env:VERSION.TrimStart("v")
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item "target/$env:TARGET/release/forge-guardrails-proxy.exe" "dist/forge-guardrails-proxy.exe"
          Compress-Archive `
            -Path "dist/forge-guardrails-proxy.exe" `
            -DestinationPath "dist/forge-guardrails-proxy-$ver-$env:SUFFIX.zip" `
            -Force

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: |
            dist/*.zip
            dist/*.tar.gz

  release:
    name: Publish GitHub Release
    needs: [publish, build-binary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      arm_sha: ${{ steps.sha.outputs.arm }}
      x86_sha: ${{ steps.sha.outputs.x86 }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256 checksums
        id: sha
        run: |
          set -euo pipefail
          cd artifacts
          ver="${GITHUB_REF_NAME#v}"
          arm_archive="./forge-guardrails-proxy-${ver}-macos-arm64.zip"
          x86_archive="./forge-guardrails-proxy-${ver}-macos-x86_64.zip"
          echo "arm=$(sha256sum "${arm_archive}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "x86=$(sha256sum "${x86_archive}" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          sha256sum ./* > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  update-homebrew-cask:
    name: Update Homebrew Cask
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect tap token
        id: tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "${TAP_TOKEN}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        id: ver
        run: echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.tap.outputs.available == 'true'
        uses: actions/checkout@v5
        with:
          repository: whit3rabbit/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate cask
        if: steps.tap.outputs.available == 'true'
        env:
          VER: ${{ steps.ver.outputs.VER }}
          ARM: ${{ needs.release.outputs.arm_sha }}
          X86: ${{ needs.release.outputs.x86_sha }}
        run: |
          chmod +x scripts/render_homebrew_cask.sh
          scripts/render_homebrew_cask.sh \
            packaging/homebrew/Casks/forge-guardrails-proxy.rb \
            homebrew-tap/Casks/forge-guardrails-proxy.rb \
            "${VER}" \
            "${ARM}" \
            "${X86}"
          ruby -c homebrew-tap/Casks/forge-guardrails-proxy.rb

      - name: Commit and push cask
        if: steps.tap.outputs.available == 'true'
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/forge-guardrails-proxy.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update forge-guardrails-proxy cask to ${{ steps.ver.outputs.VER }}"
          git push origin main
