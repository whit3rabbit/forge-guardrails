name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail

          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "forge-guardrails") | .version')"
          expected_tag="v${crate_version}"

          if [[ "${GITHUB_REF_NAME}" != "${expected_tag}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match crate version ${crate_version}."
            echo "Expected tag: ${expected_tag}"
            exit 1
          fi

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check all targets
        run: cargo check --workspace --all-targets --locked

      - name: Lint all targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test all targets
        run: cargo test --workspace --all-targets --locked

      - name: Package crate
        run: cargo package --locked

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
