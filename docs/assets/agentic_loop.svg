<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1550" width="100%" height="auto">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <linearGradient id="init-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    
    <linearGradient id="loop-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="success-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>

    <linearGradient id="fail-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c0519"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>

    <linearGradient id="warn-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    
    <linearGradient id="logic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <linearGradient id="action-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 800; fill: #f8fafc; text-anchor: middle; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #94a3b8; text-anchor: middle; }
    .section-title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #818cf8; }
    .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #f8fafc; text-anchor: middle; }
    .node-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #cbd5e1; text-anchor: middle; }
    .line-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: bold; fill: #94a3b8; text-anchor: middle; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; stroke-dasharray: none; }
    .arrow-dash { stroke: #64748b; stroke-width: 2; fill: none; stroke-dasharray: 5,5; }
    .arrowhead { fill: #475569; }
    .marker-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #f8fafc; }
  </style>

  <!-- Background Card -->
  <rect width="1000" height="1550" rx="16" fill="#0b0f19" stroke="#1e293b" stroke-width="2"/>

  <!-- Title Section -->
  <rect x="0" y="0" width="1000" height="90" fill="url(#header-grad)" rx="16" clip-path="inset(0 0 800 0)" opacity="0.15" />
  <text x="500" y="45" class="title">WORKFLOW AGENTIC LOOP</text>
  <text x="500" y="70" class="subtitle">Rust Parity Implementation of the Multi-Turn Guardrail Execution Loop</text>

  <!-- INITIALIZATION SECTION -->
  <g filter="url(#shadow)">
    <!-- Boundary box for Initialization -->
    <rect x="50" y="110" width="900" height="130" rx="12" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="8,4" />
    <text x="70" y="135" class="section-title">Initialization</text>
    
    <!-- Node 1: Build Messages -->
    <rect x="180" y="150" width="280" height="70" rx="8" fill="url(#init-grad)" stroke="#4338ca" stroke-width="1.5"/>
    <text x="320" y="180" class="node-text">Build Initial Messages</text>
    <text x="320" y="198" class="node-desc">system prompt + user input</text>

    <!-- Node 2: Guardrails Init -->
    <rect x="540" y="150" width="280" height="70" rx="8" fill="url(#init-grad)" stroke="#4338ca" stroke-width="1.5"/>
    <text x="680" y="180" class="node-text">Initialize Guardrail Middleware</text>
    <text x="680" y="198" class="node-desc">ResponseValidator, StepEnforcer, ErrorTracker</text>
  </g>

  <!-- Loop Entry Marker -->
  <circle cx="500" cy="290" r="10" fill="#6366f1" />
  <text x="520" y="294" class="marker-text" font-weight="bold" fill="#6366f1">Main Loop Entry (up to max_iterations)</text>

  <!-- MAIN LOOP SECTION -->
  <g filter="url(#shadow)">
    <!-- Boundary box for Main Loop -->
    <rect x="50" y="320" width="900" height="1200" rx="12" fill="none" stroke="#1e293b" stroke-width="2" />
    <text x="70" y="345" class="section-title">Loop Iteration</text>

    <!-- Cancel Event Check -->
    <polygon points="500,350 580,390 500,430 420,390" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="500" y="394" class="node-text">Cancel?</text>

    <!-- Raised Cancelled Error -->
    <rect x="730" y="355" width="180" height="70" rx="8" fill="url(#fail-grad)" stroke="#be123c" stroke-width="1.5"/>
    <text x="820" y="385" class="node-text">WorkflowCancelledError</text>
    <text x="820" y="403" class="node-desc">Raise to Caller</text>

    <!-- Maybe Compact -->
    <rect x="350" y="470" width="300" height="60" rx="8" fill="url(#action-grad)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="500" y="498" class="node-text">3a. ContextManager::maybe_compact()</text>
    <text x="500" y="514" class="node-desc">Run TieredCompact if budget exceeded</text>

    <!-- Send to LLM -->
    <rect x="350" y="560" width="300" height="70" rx="8" fill="url(#action-grad)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="500" y="590" class="node-text">3b. run_inference()</text>
    <text x="500" y="608" class="node-desc">Fold reasoning, serialize &amp; call backend</text>

    <!-- Check Type Decision -->
    <polygon points="500,660 620,700 500,740 380,700" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="500" y="704" class="node-text">Response Type?</text>

    <!-- ==================== LEFT BRANCH: TEXT PATH ==================== -->
    <text x="200" y="685" class="line-text" fill="#818cf8">TextResponse (or Needs Retry)</text>

    <!-- ResponseValidator::validate() -->
    <rect x="80" y="770" width="280" height="60" rx="8" fill="url(#loop-grad)" stroke="#475569" stroke-width="1.5"/>
    <text x="220" y="798" class="node-text">ResponseValidator::validate()</text>
    <text x="220" y="814" class="node-desc">Rescue parse, check unknown tools</text>

    <!-- Decision: needs_retry? -->
    <polygon points="220,860 300,900 220,940 140,900" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="220" y="904" class="node-text">Needs Retry?</text>

    <!-- Decision: retries_exhausted? -->
    <polygon points="220,970 310,1010 220,1050 130,1010" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="220" y="1014" class="node-text">Exhausted?</text>

    <!-- Raise ToolCallError -->
    <rect x="80" y="1090" width="280" height="60" rx="8" fill="url(#fail-grad)" stroke="#be123c" stroke-width="1.5"/>
    <text x="220" y="1118" class="node-text">Raise ToolCallError</text>
    <text x="220" y="1134" class="node-desc">Hard failure: rescue attempts failed</text>

    <!-- Nudge & Loop -->
    <rect x="80" y="1200" width="280" height="70" rx="8" fill="url(#warn-grad)" stroke="#c2410c" stroke-width="1.5"/>
    <text x="220" y="1230" class="node-text">Emit retry_nudge (role=user)</text>
    <text x="220" y="1248" class="node-desc">Nudge model to correct output</text>

    <!-- ==================== RIGHT BRANCH: TOOL CALL PATH ==================== -->
    <text x="750" y="685" class="line-text" fill="#818cf8">ToolCall Batch</text>

    <!-- Decision: All tools known? -->
    <polygon points="700,750 800,790 700,830 600,790" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="700" y="794" class="node-text">All Known?</text>

    <!-- Unknown tool nudge -->
    <rect x="420" y="755" width="160" height="70" rx="8" fill="url(#warn-grad)" stroke="#c2410c" stroke-width="1.5"/>
    <text x="500" y="785" class="node-text">Emit Unknown Tool Error</text>
    <text x="500" y="803" class="node-desc">role=tool, per blocked call</text>

    <!-- Decision: Premature terminal? -->
    <polygon points="700,860 800,900 700,940 600,900" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="700" y="898" class="node-text">Premature</text>
    <text x="700" y="912" class="node-desc">terminal?</text>

    <!-- StepEnforcementError Nudge -->
    <rect x="420" y="865" width="160" height="70" rx="8" fill="url(#fail-grad)" stroke="#be123c" stroke-width="1.5"/>
    <text x="500" y="895" class="node-text">StepEnforcementError</text>
    <text x="500" y="913" class="node-desc">Raise or emit tool-error nudge</text>

    <!-- Decision: Prerequisites check? -->
    <polygon points="700,970 800,1010 700,1050 600,1010" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="700" y="1004" class="node-text">Prereqs Met?</text>

    <!-- PrereqError Nudge -->
    <rect x="420" y="975" width="160" height="70" rx="8" fill="url(#fail-grad)" stroke="#be123c" stroke-width="1.5"/>
    <text x="500" y="1005" class="node-text">PrerequisiteError</text>
    <text x="500" y="1023" class="node-desc">Raise or emit tool-error nudge</text>

    <!-- Emit Tool Call -->
    <rect x="600" y="1090" width="200" height="50" rx="8" fill="url(#loop-grad)" stroke="#475569" stroke-width="1.5"/>
    <text x="700" y="1120" class="node-text">Emit Reasoning + ToolCall</text>

    <!-- Execute Batch -->
    <rect x="600" y="1170" width="200" height="70" rx="8" fill="url(#action-grad)" stroke="#0284c7" stroke-width="1.5"/>
    <text x="700" y="1198" class="node-text">Execute All Tools in Batch</text>
    <text x="700" y="1216" class="node-desc">In parallel or sequence</text>

    <!-- Tool Execution Exception handler -->
    <polygon points="700,1270 780,1310 700,1350 620,1310" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="700" y="1314" class="node-text">Error Type?</text>

    <!-- Fail / Raise ToolExecutionError -->
    <rect x="810" y="1275" width="160" height="70" rx="8" fill="url(#fail-grad)" stroke="#be123c" stroke-width="1.5"/>
    <text x="890" y="1305" class="node-text">ToolExecutionError</text>
    <text x="890" y="1323" class="node-desc">Raise to Caller</text>

    <!-- Terminal Tool Check -->
    <polygon points="700,1380 790,1420 700,1460 610,1420" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5"/>
    <text x="700" y="1418" class="node-text">Terminal Tool</text>
    <text x="700" y="1432" class="node-desc">Succeeded?</text>

    <!-- Return Success -->
    <rect x="350" y="1395" width="200" height="50" rx="8" fill="url(#success-grad)" stroke="#059669" stroke-width="1.5"/>
    <text x="450" y="1425" class="node-text">Return Terminal Result</text>

    <!-- Record Success & Nudge Loop -->
    <rect x="810" y="1390" width="160" height="60" rx="8" fill="url(#loop-grad)" stroke="#475569" stroke-width="1.5"/>
    <text x="890" y="1418" class="node-text">StepEnforcer::record()</text>
    <text x="890" y="1434" class="node-desc">Reset errors, loop next</text>
  </g>

  <!-- ==================== ARROWS & PATHS ==================== -->
  <g>
    <!-- Arrowhead definitions -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" class="arrowhead" />
    </marker>

    <!-- Init -> Cancel -->
    <path d="M 320,220 L 320,260 L 500,260 L 500,350" class="arrow" marker-end="url(#arrow)" />
    <path d="M 680,220 L 680,260 L 500,260" class="arrow" />

    <!-- Cancel? -> Cancelled -->
    <path d="M 580,390 L 730,390" class="arrow" marker-end="url(#arrow)" />
    <text x="645" y="380" class="line-text">Yes</text>

    <!-- Cancel? -> Compact -->
    <path d="M 500,430 L 500,470" class="arrow" marker-end="url(#arrow)" />
    <text x="515" y="450" class="line-text">No</text>

    <!-- Compact -> Send -->
    <path d="M 500,530 L 500,560" class="arrow" marker-end="url(#arrow)" />

    <!-- Send -> Type Check -->
    <path d="M 500,630 L 500,660" class="arrow" marker-end="url(#arrow)" />

    <!-- Type Check -> Text Validator -->
    <path d="M 380,700 L 220,700 L 220,770" class="arrow" marker-end="url(#arrow)" />

    <!-- Text Validator -> Needs Retry -->
    <path d="M 220,830 L 220,860" class="arrow" marker-end="url(#arrow)" />

    <!-- Needs Retry? -> Retries Exhausted -->
    <path d="M 220,940 L 220,970" class="arrow" marker-end="url(#arrow)" />
    <text x="235" y="955" class="line-text">Yes</text>

    <!-- Needs Retry? -> Tool Path (Rescued successfully) -->
    <path d="M 300,900 L 360,900 L 360,650 L 580,650 L 700,750" class="arrow" marker-end="url(#arrow)" />
    <text x="345" y="885" class="line-text">No</text>

    <!-- Retries Exhausted? -> Fail -->
    <path d="M 220,1050 L 220,1090" class="arrow" marker-end="url(#arrow)" />
    <text x="235" y="1070" class="line-text">Yes</text>

    <!-- Retries Exhausted? -> Nudge -->
    <path d="M 130,1010 L 40,1010 L 40,1235 L 80,1235" class="arrow" marker-end="url(#arrow)" />
    <text x="60" y="995" class="line-text">No</text>

    <!-- Nudge -> Loop (Back to Cancel check) -->
    <path d="M 220,1270 L 220,1490 L 20,1490 L 20,290 L 490,290" class="arrow" marker-end="url(#arrow)" />

    <!-- Type Check -> Tool Path Check -->
    <path d="M 620,700 L 700,700 L 700,750" class="arrow" marker-end="url(#arrow)" />

    <!-- All Known? -> Premature Check -->
    <path d="M 700,830 L 700,860" class="arrow" marker-end="url(#arrow)" />
    <text x="715" y="845" class="line-text">Yes</text>

    <!-- All Known? -> Unknown Tool Nudge -->
    <path d="M 600,790 L 580,790" class="arrow" marker-end="url(#arrow)" />
    <text x="590" y="780" class="line-text">No</text>

    <!-- Unknown Tool Nudge -> Loop -->
    <path d="M 500,755 L 500,450 L 490,450" class="arrow-dash" />

    <!-- Premature? -> Prereq Check -->
    <path d="M 700,940 L 700,970" class="arrow" marker-end="url(#arrow)" />
    <text x="715" y="955" class="line-text">No</text>

    <!-- Premature? -> Step Enforcement Nudge -->
    <path d="M 600,900 L 580,900" class="arrow" marker-end="url(#arrow)" />
    <text x="590" y="890" class="line-text">Yes</text>

    <!-- Step Enforcement Nudge -> Loop -->
    <path d="M 500,865 L 500,750" class="arrow-dash" />

    <!-- Prereq? -> Emit Tool Call -->
    <path d="M 700,1050 L 700,1090" class="arrow" marker-end="url(#arrow)" />
    <text x="715" y="1070" class="line-text">Yes</text>

    <!-- Prereq? -> Prereq Nudge -->
    <path d="M 600,1010 L 580,1010" class="arrow" marker-end="url(#arrow)" />
    <text x="590" y="1000" class="line-text">No</text>

    <!-- Prereq Nudge -> Loop -->
    <path d="M 500,975 L 500,935" class="arrow-dash" />

    <!-- Emit Tool Call -> Execute Batch -->
    <path d="M 700,1140 L 700,1170" class="arrow" marker-end="url(#arrow)" />

    <!-- Execute Batch -> Error Type -->
    <path d="M 700,1240 L 700,1270" class="arrow" marker-end="url(#arrow)" />

    <!-- Error Type? -> Fail -->
    <path d="M 780,1310 L 810,1310" class="arrow" marker-end="url(#arrow)" />
    <text x="795" y="1300" class="line-text">Yes</text>

    <!-- Error Type? -> Terminal Check (No error) -->
    <path d="M 700,1350 L 700,1380" class="arrow" marker-end="url(#arrow)" />
    <text x="715" y="1365" class="line-text">No</text>

    <!-- Terminal Check -> Return -->
    <path d="M 610,1420 L 550,1420" class="arrow" marker-end="url(#arrow)" />
    <text x="580" y="1410" class="line-text">Yes</text>

    <!-- Terminal Check -> Record Success -->
    <path d="M 790,1420 L 810,1420" class="arrow" marker-end="url(#arrow)" />
    <text x="800" y="1410" class="line-text">No</text>

    <!-- Record Success -> Loop (back to Cancel Check) -->
    <path d="M 890,1390 L 890,1250 L 980,1250 L 980,290 L 510,290" class="arrow" marker-end="url(#arrow)" />
  </g>

</svg>
