<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 740" width="100%" height="auto">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    
    <!-- Linear Gradients -->
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <linearGradient id="p1-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>

    <linearGradient id="p2-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c2d12"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>

    <linearGradient id="p3-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4c0519"/>
      <stop offset="100%" stop-color="#881337"/>
    </linearGradient>

    <linearGradient id="logic-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>

  <style>
    .title { font-family: system-ui, -apple-system, sans-serif; font-size: 24px; font-weight: 800; fill: #f8fafc; text-anchor: middle; }
    .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; fill: #94a3b8; text-anchor: middle; }
    .phase-title { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 800; fill: #f8fafc; text-anchor: middle; }
    .node-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 700; fill: #f8fafc; text-anchor: middle; }
    .node-desc { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #e2e8f0; }
    .line-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: bold; fill: #94a3b8; text-anchor: middle; }
    .arrow { stroke: #475569; stroke-width: 2; fill: none; }
    .arrowhead { fill: #475569; }
    .note-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #94a3b8; text-anchor: middle; }
  </style>

  <!-- Background Card -->
  <rect width="950" height="740" rx="16" fill="#0b0f19" stroke="#1e293b" stroke-width="2"/>

  <!-- Title Section -->
  <rect x="0" y="0" width="950" height="90" fill="url(#header-grad)" rx="16" clip-path="inset(0 0 500 0)" opacity="0.15" />
  <text x="475" y="45" class="title">TIERED COMPACTION PHASES</text>
  <text x="475" y="70" class="subtitle">Deterministic Context Reduction to Keep Within LLM Window Constraints</text>

  <!-- Trigger -->
  <g filter="url(#shadow)">
    <rect x="325" y="110" width="300" height="50" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5" />
    <text x="475" y="140" class="node-text" fill="#f8fafc">Token Estimate > Budget × 0.75</text>
  </g>

  <!-- ==================== PHASE 1 ==================== -->
  <g filter="url(#shadow)">
    <!-- Boundary Box -->
    <rect x="50" y="200" width="250" height="200" rx="12" fill="url(#p1-grad)" stroke="#059669" stroke-width="2" />
    <text x="175" y="230" class="phase-title">Phase 1: Light</text>
    
    <!-- Actions -->
    <rect x="65" y="250" width="220" height="130" rx="6" fill="#022c22" fill-opacity="0.6" />
    <text x="80" y="280" class="node-desc" font-weight="bold" fill="#34d399">Actions:</text>
    <text x="80" y="305" class="node-desc">1. Drop all nudges</text>
    <text x="95" y="322" class="node-desc" fill="#a7f3d0">(step, prereq, retry)</text>
    <text x="80" y="345" class="node-desc">2. Truncate old tool_results</text>
    <text x="95" y="362" class="node-desc" fill="#a7f3d0">(keep first ~200 chars)</text>
  </g>

  <!-- Decision 1 -->
  <polygon points="175,440 235,475 175,510 115,475" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5" />
  <text x="175" y="479" class="node-text" font-size="11">Under Threshold?</text>

  <!-- Success Output 1 -->
  <rect x="75" y="560" width="200" height="50" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5" />
  <text x="175" y="590" class="node-text">Return Compacted (P1)</text>

  <!-- ==================== PHASE 2 ==================== -->
  <g filter="url(#shadow)">
    <!-- Boundary Box -->
    <rect x="350" y="200" width="250" height="200" rx="12" fill="url(#p2-grad)" stroke="#ea580c" stroke-width="2" />
    <text x="475" y="230" class="phase-title">Phase 2: Moderate</text>
    
    <!-- Actions -->
    <rect x="365" y="250" width="220" height="130" rx="6" fill="#431407" fill-opacity="0.6" />
    <text x="380" y="280" class="node-desc" font-weight="bold" fill="#ffedd5">Actions:</text>
    <text x="380" y="305" class="node-desc">1. Drop all nudges</text>
    <text x="380" y="330" class="node-desc">2. Drop tool_results entirely</text>
    <text x="380" y="355" class="node-desc" fill="#fed7aa">Note: reasoning + text preserved</text>
  </g>

  <!-- Decision 2 -->
  <polygon points="475,440 535,475 475,510 415,475" fill="url(#logic-grad)" stroke="#6d28d9" stroke-width="1.5" />
  <text x="475" y="479" class="node-text" font-size="11">Under Threshold?</text>

  <!-- Success Output 2 -->
  <rect x="375" y="560" width="200" height="50" rx="8" fill="#7c2d12" stroke="#ea580c" stroke-width="1.5" />
  <text x="475" y="590" class="node-text">Return Compacted (P2)</text>

  <!-- ==================== PHASE 3 ==================== -->
  <g filter="url(#shadow)">
    <!-- Boundary Box -->
    <rect x="650" y="200" width="250" height="200" rx="12" fill="url(#p3-grad)" stroke="#e11d48" stroke-width="2" />
    <text x="775" y="230" class="phase-title">Phase 3: Emergency</text>
    
    <!-- Actions -->
    <rect x="665" y="250" width="220" height="130" rx="6" fill="#4c0519" fill-opacity="0.6" />
    <text x="680" y="280" class="node-desc" font-weight="bold" fill="#ffe4e6">Actions:</text>
    <text x="680" y="305" class="node-desc">1. Drop all nudges + tool_results</text>
    <text x="680" y="330" class="node-desc">2. Drop reasoning &amp; text_response</text>
    <text x="680" y="355" class="node-desc" fill="#fecdd3">Only tool_call messages remain</text>
  </g>

  <!-- Return 3 -->
  <rect x="675" y="560" width="200" height="50" rx="8" fill="#4c0519" stroke="#e11d48" stroke-width="1.5" />
  <text x="775" y="590" class="node-text">Return Compacted (P3)</text>

  <!-- Bottom note -->
  <text x="475" y="680" class="note-text">
    <tspan fill="#fde047" font-weight="bold">Protected Window:</tspan> The last <tspan fill="#fff" font-weight="bold">keep_recent</tspan> iterations (default: 2) are exempt from compaction.
  </text>
  <text x="475" y="700" class="note-text" font-size="11">
    Compaction is deterministic text manipulation. System and user input prompts are never dropped.
  </text>

  <!-- ==================== CONNECTIONS ==================== -->
  <g>
    <!-- Arrowhead marker definition -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" class="arrowhead" />
    </marker>

    <!-- Trigger -> Phase 1 -->
    <path d="M 475,160 L 475,180 L 175,180 L 175,200" class="arrow" marker-end="url(#arrow)" />

    <!-- Phase 1 -> Check 1 -->
    <path d="M 175,400 L 175,440" class="arrow" marker-end="url(#arrow)" />

    <!-- Check 1 -> Success 1 -->
    <path d="M 175,510 L 175,560" class="arrow" marker-end="url(#arrow)" />
    <text x="190" y="535" class="line-text">Yes</text>

    <!-- Check 1 -> Phase 2 -->
    <path d="M 235,475 L 350,475 L 350,300" class="arrow" marker-end="url(#arrow)" />
    <text x="290" y="465" class="line-text">No</text>

    <!-- Phase 2 -> Check 2 -->
    <path d="M 475,400 L 475,440" class="arrow" marker-end="url(#arrow)" />

    <!-- Check 2 -> Success 2 -->
    <path d="M 475,510 L 475,560" class="arrow" marker-end="url(#arrow)" />
    <text x="490" y="535" class="line-text">Yes</text>

    <!-- Check 2 -> Phase 3 -->
    <path d="M 535,475 L 650,475 L 650,300" class="arrow" marker-end="url(#arrow)" />
    <text x="590" y="465" class="line-text">No</text>

    <!-- Phase 3 -> Output 3 -->
    <path d="M 775,400 L 775,560" class="arrow" marker-end="url(#arrow)" />
  </g>

</svg>
